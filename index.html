<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Ebitter</title>
<style>
html, body { margin: 0; padding: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
canvas { display: block; }
</style>
</head>
<body>
<script src="wasm_exec.js"></script>
<script>
const go = new Go();
WebAssembly.instantiateStreaming(fetch("ebitter.wasm"), go.importObject)
  .then(res => go.run(res.instance));
</script>
</body>
</html>
